name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify and package
        run: |
          npm run lint
          npm test
          npm run build
          npx @vscode/vsce package

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          VSIX="agentic-kanban-${VERSION}.vsix"
          MARKETPLACE="Install via the Visual Studio Marketplace: https://marketplace.visualstudio.com/items?itemName=milzam.agentic-kanban"
          OPEN_VSX="Install via Open VSX: https://open-vsx.org/extension/milzam/agentic-kanban"
          GENERATED=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.ref_name }}" \
            --jq '.body')
          NOTES="${MARKETPLACE}"$'\n'"${OPEN_VSX}"$'\n\n'"${GENERATED}"
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${NOTES}" \
            "${VSIX}"
