name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate release source
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          echo "Tag version:     ${TAG_VERSION}"
          echo "Package version: ${PACKAGE_VERSION}"

          if [ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]; then
            echo "::error::Tag ${GITHUB_REF_NAME} does not match package.json version ${PACKAGE_VERSION}"
            exit 1
          fi

          git fetch origin main

          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "::error::Release tag must point to a commit contained in main"
            exit 1
          fi

      - name: Verify and package
        run: |
          npm run lint
          npm test
          npm run build
          npx @vscode/vsce package

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          VSIX="agentic-kanban-${VERSION}.vsix"
          RELEASES_URL="https://github.com/${{ github.repository }}/releases"
          INSTALL_NOTE="Download ${VSIX} from GitHub Releases: ${RELEASES_URL}"
          INSTALL_CMD='code --install-extension '"${VSIX}"
          GENERATED=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.ref_name }}" \
            --jq '.body')
          NOTES="${INSTALL_NOTE}"$'\n\n'"Install in VS Code:"$'\n```bash\n'"${INSTALL_CMD}"$'\n```'$'\n\n'"${GENERATED}"
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${NOTES}" \
            "${VSIX}"
