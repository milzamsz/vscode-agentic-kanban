name: Release

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify and package
        run: |
          npm run lint
          npm test
          npm run build
          npx @vscode/vsce package

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(node -p "require('./package.json').version")
          VSIX="agentic-kanban-${VERSION}.vsix"
          RELEASES_URL="https://github.com/${{ github.repository }}/releases"
          INSTALL_NOTE="Download ${VSIX} from GitHub Releases: ${RELEASES_URL}"
          INSTALL_CMD='code --install-extension '"${VSIX}"
          GENERATED=$(gh api repos/${{ github.repository }}/releases/generate-notes \
            -f tag_name="${{ github.ref_name }}" \
            --jq '.body')
          NOTES="${INSTALL_NOTE}"$'\n\n'"Install in VS Code:"$'\n```bash\n'"${INSTALL_CMD}"$'\n```'$'\n\n'"${GENERATED}"
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes "${NOTES}" \
            "${VSIX}"
