<svg
  xmlns="http://www.w3.org/2000/svg"
  width="512"
  height="512"
  viewBox="0 0 512 512"
  fill="none"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Agentic Kanban Three Column Mark</title>
  <desc id="desc">Three rounded kanban columns with a violet-to-blue gradient.</desc>

  <defs>
    <linearGradient
      id="agentic-kanban-gradient"
      x1="256"
      y1="42"
      x2="256"
      y2="470"
      gradientUnits="userSpaceOnUse"
    >
      <stop offset="0" stop-color="#A3A3FF"/>
      <stop offset="1" stop-color="#2020FF"/>
    </linearGradient>
  </defs>

  <rect
    x="42"
    y="42"
    width="118"
    height="428"
    rx="30"
    fill="url(#agentic-kanban-gradient)"
  />

  <rect
    x="197"
    y="42"
    width="118"
    height="338"
    rx="30"
    fill="url(#agentic-kanban-gradient)"
  />

  <rect
    x="352"
    y="42"
    width="118"
    height="248"
    rx="30"
    fill="url(#agentic-kanban-gradient)"
  />
</svg>
